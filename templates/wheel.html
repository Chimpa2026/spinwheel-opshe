<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ brand.handle or 'Spin Wheel' }} - Spin &amp; Menang!</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- dekorasi sparkle -->
  <div class="sparkle" style="top:8%; left:12%;">✦</div>
  <div class="sparkle" style="top:20%; left:85%; animation-delay:.6s;">✦</div>
  <div class="sparkle" style="top:75%; left:8%; animation-delay:1.1s;">✦</div>
  <div class="sparkle" style="top:85%; left:88%; animation-delay:1.6s;">✦</div>

  <div class="wheel-page">
    <div class="stage">
      <svg class="pointer-svg" id="pointer-svg" viewBox="0 0 60 92" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="pointerGold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff6da"/>
            <stop offset="45%" stop-color="#f0c869"/>
            <stop offset="100%" stop-color="#c99a3b"/>
          </linearGradient>
        </defs>
        <path d="M30 90 C18 68 6 50 6 32 C6 15 17 4 30 4 C43 4 54 15 54 32 C54 50 42 68 30 90 Z"
              fill="url(#pointerGold)" stroke="#a87f2e" stroke-width="1.5"/>
        <circle cx="30" cy="30" r="12" fill="#ff2f8f" stroke="#fff" stroke-width="2.5"/>
        <circle cx="26" cy="26" r="3.2" fill="#ffffff" opacity="0.8"/>
      </svg>

      <div class="wheel-wrap">
        <div class="bulbs" id="bulbs"></div>
        <canvas id="wheel-canvas" width="600" height="600"></canvas>
        <div class="center-badge">
          {% if brand.logo %}
            <img class="center-logo" src="{{ url_for('static', filename=brand.logo) }}" alt="Logo toko">
          {% else %}
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
              <path d="M12 2C10 6 6 8 4 8c0 5 3.5 9 8 12 4.5-3 8-7 8-12-2 0-6-2-8-6z" fill="#fff"/>
            </svg>
          {% endif %}
        </div>
      </div>

      <button id="spin-btn" class="spin-btn">SPIN</button>
      <a href="{{ url_for('login') }}" class="admin-link">Login Admin</a>
    </div>
  </div>

  <div class="result-overlay" id="result-overlay">
    <div class="result-card">
      <div class="eyebrow">Selamat! 🎉</div>
      <div class="prize-name" id="result-prize">-</div>
      <button class="btn btn-primary" id="close-result" style="margin-top:0;">Asyik!</button>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>

  <script>
    const PRIZES = {{ prizes|tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/wheel.js') }}"></script>
</body>
</html>
